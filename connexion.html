<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Se connecter — L'atelier des enfants </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
 
<div class="topbar">
  <a href="index.html" class="back">← Retour au site</a>
  <div class="brand">L'atelier des enfants</div>
</div>
 
<div class="wrap">
  <span class="eyebrow">Espace parents</span>
  <h1 class="title">Se connecter</h1>
  <p class="subtitle">Pour réserver une garde en ligne</p>
 
  <div class="card">
    <label for="login-email">Adresse e-mail</label>
    <input type="email" id="login-email" placeholder="vous@exemple.com">
    <label for="login-password">Mot de passe</label>
    <input type="password" id="login-password" placeholder="••••••••">
    <button class="btn" id="btn-login">Se connecter</button>
    <div class="msg" id="login-msg"></div>
    <div class="switch-mode"><a href="oublie.html">Mot de passe oublié ?</a></div>
    <div class="switch-mode">Pas encore de compte ? <a href="compte.html">Créer un compte</a></div>
  </div>
</div>
 
<script src="shared-config.js"></script>
<script>
function showMsg(id, text, type){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg show ' + type;
}
 
document.getElementById('btn-login').onclick = async () => {
  if(!supabase){
    showMsg('login-msg', "Le service de connexion n'est pas disponible. Vérifiez votre connexion internet ou essayez avec Chrome/Safari.", 'err');
    return;
  }
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
 
  if(!email || !password){
    showMsg('login-msg', "Merci de remplir tous les champs.", 'err');
    return;
  }
 
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = "Connexion en cours...";
 
  try {
    const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("Le serveur ne répond pas (délai dépassé). Vérifiez votre connexion internet.")), 10000));
    const { data, error } = await Promise.race([
      supabase.auth.signInWithPassword({ email, password }),
      timeout
    ]);
 
    if(error){
      showMsg('login-msg', error.message, 'err');
      return;
    }
 
    showMsg('login-msg', "Connecté ! Redirection...", 'ok');
    setTimeout(() => { window.location.href = "reservation.html"; }, 800);
  } catch(err){
    showMsg('login-msg', "Erreur réseau : " + err.message, 'err');
    showDebug("Login : " + err.message);
  } finally {
    btn.disabled = false; btn.textContent = "Se connecter";
  }
};
 
// Si deja connecte, redirection directe
if(supabase){
  (async () => {
    const { data } = await supabase.auth.getSession();
    if(data.session && data.session.user){
      window.location.href = "reservation.html";
    }
  })();
}
</script>
 
</body>
</html>
