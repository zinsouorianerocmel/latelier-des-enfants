<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié — Oriane Zinsou</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
</head>
<body>
 
<div class="topbar">
  <a href="index.html" class="back">← Retour au site</a>
  <div class="brand">Oriane Zinsou</div>
</div>
 
<div class="wrap">
  <span class="eyebrow">Espace parents</span>
  <h1 class="title" id="page-title">Mot de passe oublié</h1>
  <p class="subtitle" id="page-subtitle">Recevez un lien pour le réinitialiser</p>
 
  <div class="card">
    <!-- Ecran 1 : demande du lien -->
    <div id="request-form">
      <label for="forgot-email">Adresse e-mail</label>
      <input type="email" id="forgot-email" placeholder="vous@exemple.com">
      <button class="btn" id="btn-forgot">Envoyer le lien de réinitialisation</button>
      <div class="msg" id="forgot-msg"></div>
      <div class="switch-mode"><a href="connexion.html">Retour à la connexion</a></div>
    </div>
 
    <!-- Ecran 2 : saisie du nouveau mot de passe (apres clic sur le lien recu par mail) -->
    <div id="reset-form" class="hidden">
      <p style="font-size:13.5px; color:var(--stone); margin-bottom:8px;">Choisissez votre nouveau mot de passe.</p>
      <label for="reset-password">Nouveau mot de passe</label>
      <input type="password" id="reset-password" placeholder="6 caractères minimum">
      <button class="btn" id="btn-reset">Mettre à jour le mot de passe</button>
      <div class="msg" id="reset-msg"></div>
    </div>
  </div>
</div>
 
<script src="shared-config.js"></script>
<script>
function showMsg(id, text, type){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg show ' + type;
}
 
document.getElementById('btn-forgot').onclick = async () => {
  if(!supabase){
    showMsg('forgot-msg', "Le service n'est pas disponible. Vérifiez votre connexion internet ou essayez avec Chrome/Safari.", 'err');
    return;
  }
  const email = document.getElementById('forgot-email').value.trim();
  if(!email){
    showMsg('forgot-msg', "Merci de saisir votre e-mail.", 'err');
    return;
  }
  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + window.location.pathname
  });
  if(error){
    showMsg('forgot-msg', error.message, 'err');
    return;
  }
  showMsg('forgot-msg', "E-mail envoyé ! Vérifiez votre boîte de réception (et vos spams).", 'ok');
};
 
document.getElementById('btn-reset').onclick = async () => {
  if(!supabase){
    showMsg('reset-msg', "Le service n'est pas disponible.", 'err');
    return;
  }
  const newPassword = document.getElementById('reset-password').value;
  if(!newPassword || newPassword.length < 6){
    showMsg('reset-msg', "6 caractères minimum.", 'err');
    return;
  }
  const { error } = await supabase.auth.updateUser({ password: newPassword });
  if(error){
    showMsg('reset-msg', error.message, 'err');
    return;
  }
  showMsg('reset-msg', "Mot de passe mis à jour ! Redirection...", 'ok');
  setTimeout(() => { window.location.href = "reservation.html"; }, 1200);
};
 
// Si Supabase nous renvoie ici suite au clic sur le lien recu par mail,
// on bascule automatiquement sur le formulaire "nouveau mot de passe"
if(supabase){
  supabase.auth.onAuthStateChange((event) => {
    if(event === 'PASSWORD_RECOVERY'){
      document.getElementById('request-form').classList.add('hidden');
      document.getElementById('reset-form').classList.remove('hidden');
      document.getElementById('page-title').textContent = "Nouveau mot de passe";
      document.getElementById('page-subtitle').textContent = "Dernière étape avant de réserver";
    }
  });
}
</script>
 
</body>
</html>
