<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte — L'aterlier des enfants </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
 
<div class="topbar">
  <a href="index.html" class="back">← Retour au site</a>
  <div class="brand">L'atelier des enfants </div>
</div>
 
<div class="wrap">
  <span class="eyebrow">Espace parents</span>
  <h1 class="title">Créer un compte</h1>
  <p class="subtitle">Pour réserver une garde en ligne</p>
 
  <div class="card">
    <label for="signup-name">Votre nom</label>
    <input type="text" id="signup-name" placeholder="Prénom Nom">
    <label for="signup-email">Adresse e-mail</label>
    <input type="email" id="signup-email" placeholder="vous@exemple.com">
    <label for="signup-phone">Téléphone</label>
    <input type="tel" id="signup-phone" placeholder="+33 6 12 34 56 78">
    <label for="signup-password">Mot de passe</label>
    <input type="password" id="signup-password" placeholder="6 caractères minimum">
    <button class="btn" id="btn-signup">Créer mon compte</button>
    <div class="msg" id="signup-msg"></div>
    <div class="switch-mode">Déjà un compte ? <a href="connexion.html">Se connecter</a></div>
  </div>
</div>
 
<script src="shared-config.js"></script>
<script>
function showMsg(id, text, type){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg show ' + type;
}
 
document.getElementById('btn-signup').onclick = async () => {
  if(!supabase){
    showMsg('signup-msg', "Le service de connexion n'est pas disponible. Vérifiez votre connexion internet ou essayez avec Chrome/Safari.", 'err');
    return;
  }
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const phone = document.getElementById('signup-phone').value.trim();
  const password = document.getElementById('signup-password').value;
 
  if(!name || !email || !password){
    showMsg('signup-msg', "Merci de remplir tous les champs.", 'err');
    return;
  }
  if(password.length < 6){
    showMsg('signup-msg', "Le mot de passe doit faire au moins 6 caractères.", 'err');
    return;
  }
 
  const btn = document.getElementById('btn-signup');
  btn.disabled = true; btn.textContent = "Création en cours...";
 
  try {
    const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("Le serveur ne répond pas (délai dépassé). Vérifiez votre connexion internet.")), 10000));
    const { data, error } = await Promise.race([
      supabase.auth.signUp({
        email, password,
        options: { data: { full_name: name, phone: phone } }
      }),
      timeout
    ]);
 
    if(error){
      showMsg('signup-msg', error.message, 'err');
      return;
    }
 
    showMsg('signup-msg', "Compte créé ! Redirection vers la réservation...", 'ok');
    setTimeout(() => { window.location.href = "reservation.html"; }, 1000);
  } catch(err){
    showMsg('signup-msg', "Erreur réseau : " + err.message, 'err');
    showDebug("Signup : " + err.message);
  } finally {
    btn.disabled = false; btn.textContent = "Créer mon compte";
  }
};
</script>
 
</body>
</html>
